{% extends 'base.html' %}
{% block content %}
<h2 class="h4 mb-3">All Appointments</h2>
<div class="card shadow-sm">
  <div class="table-responsive">
  <table class="table table-striped table-hover align-middle mb-0">
    <thead class="table-light"><tr><th>Date</th><th>Time</th><th>Patient</th><th>Doctor</th><th>Status</th><th>Reason</th></tr></thead>
    <tbody>
      {% for a in appts %}
      <tr>
        <td>{{ a['date'] }}</td>
        <td>{{ a['time'] }}</td>
        <td>{{ a['patient_name'] }}</td>
        <td>{{ a['doctor_name'] }}</td>
        <td>{{ a['status'] }}</td>
        <td>{{ a['reason'] or '' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
</div>
{% endblock %}
