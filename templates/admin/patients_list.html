{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-2">
  <h2 class="h4 m-0">Patients</h2>
</div>
<form class="row g-2 mb-3">
  <div class="col-sm-6 col-md-4"><input class="form-control" type="text" name="q" value="{{ q }}" placeholder="Search name, email or phone"></div>
  <div class="col-auto"><button class="btn btn-outline-secondary">Search</button></div>
  <div class="col-auto"><a class="btn btn-outline-dark" href="{{ url_for('admin.patients_list') }}">Clear</a></div>
</form>
<div class="card shadow-sm">
  <div class="table-responsive">
  <table class="table table-striped table-hover align-middle mb-0">
    <thead class="table-light"><tr><th>Name</th><th>Email</th><th>Phone</th><th>Active</th><th>Actions</th></tr></thead>
    <tbody>
    {% for p in patients %}
      <tr>
        <td>{{ p['full_name'] }}</td>
        <td>{{ p['email'] }}</td>
        <td>{{ p['phone'] or '' }}</td>
        <td>{% if p['active'] %}<span class="badge bg-success">Yes</span>{% else %}<span class="badge bg-secondary">No</span>{% endif %}</td>
        <td class="text-nowrap">
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.patient_edit', patient_id=p['id']) }}">Edit</a>
            <form method="post" action="{{ url_for('admin.patient_delete', patient_id=p['id']) }}" class="d-inline" onsubmit="return confirm('Delete this Patient?')">
              <button class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  </div>
</div>
{% endblock %}
