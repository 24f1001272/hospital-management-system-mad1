{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-4">Edit Patient</h2>
        <form method="post" class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ pat['full_name'] if pat else '' }}" placeholder="Full Name" required>
                <label for="full_name">Full Name</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="email" class="form-control" id="email" name="email" value="{{ pat['email'] if pat else '' }}" placeholder="Email" required>
                <label for="email">Email</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="text" class="form-control" id="phone" name="phone" value="{{ pat['phone'] if pat else '' }}" placeholder="Phone">
                <label for="phone">Phone</label>
              </div>
            </div>
            <div class="col-md-2 d-flex align-items-center">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="active" id="active" {% if pat and pat['active'] %}checked{% endif %}>
                <label class="form-check-label" for="active">Active</label>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-secondary" href="{{ url_for('admin.patients_list') }}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
