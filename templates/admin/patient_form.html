{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-4">Edit Patient</h2>
        <form method="post" class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="full_name" name="full_name"
                  value="{{ pat['full_name'] if pat else '' }}" placeholder="Full Name" required>
                <label for="full_name">Full Name*</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="email" class="form-control" id="email" name="email"
                  value="{{ pat['email'] if pat else '' }}" placeholder="Email" required>
                <label for="email">Email*</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="text" class="form-control" id="phone" name="phone"
                  value="{{ pat['phone'] if pat else '' }}" placeholder="Phone">
                <label for="phone">Phone</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="date" class="form-control" id="dob" name="dob"
                  value="{{ pat['dob'] if pat and pat['dob'] else '' }}" placeholder="Date of Birth">
                <label for="dob">Date of Birth</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <select class="form-select" id="gender" name="gender">
                  <option value="">Select Gender</option>
                  <option value="Male" {% if pat and pat['gender']=='Male' %}selected{% endif %}>Male</option>
                  <option value="Female" {% if pat and pat['gender']=='Female' %}selected{% endif %}>Female</option>
                  <option value="Other" {% if pat and pat['gender']=='Other' %}selected{% endif %}>Other</option>
                </select>
                <label for="gender">Gender</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <select class="form-select" id="blood_group" name="blood_group">
                  <option value="">Select Blood Group</option>
                  {% for bg in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                  <option value="{{ bg }}" {% if pat and pat['blood_group']==bg %}selected{% endif %}>{{ bg }}</option>
                  {% endfor %}
                </select>
                <label for="blood_group">Blood Group</label>
              </div>
            </div>
            <div class="col-md-2 d-flex align-items-center">
              <input type="hidden" name="active" id="active_input" value="{{ 'on' if pat and pat['active'] else '' }}">
              <button type="button"
                class="btn {{ 'btn-success' if pat and pat['active'] else 'btn-danger' }} w-100 mt-2" id="active_btn"
                onclick="toggleActive()">
                {{ 'Active' if pat and pat['active'] else 'Inactive' }}
              </button>
            </div>
            <script>
              function toggleActive() {
                const input = document.getElementById('active_input');
                const btn = document.getElementById('active_btn');
                if (input.value === 'on') {
                  input.value = '';
                  btn.textContent = 'Inactive';
                  btn.classList.replace('btn-success', 'btn-danger');
                } else {
                  input.value = 'on';
                  btn.textContent = 'Active';
                  btn.classList.replace('btn-danger', 'btn-success');
                }
              }
            </script>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-secondary" href="{{ url_for('admin.patients_list') }}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
